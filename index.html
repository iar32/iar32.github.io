<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <!-- Profile Section -->
        <section class="profile">
            <div class="image-container">
                <!-- Ensure your image is named 'profile.jpg' inside the 'Assets' folder -->
                <img src="Assets/ProfilePic.jpeg" alt="My Profile Picture" class="profile-img">            </div>
            
            <h1>Your Name</h1>
            <p class="subtitle">Creative Strategist & AI Enthusiast</p>
            <div class="divider"></div>
        </section>

        <!-- About/Bio Section -->
        <section class="content">
            <p>Welcome to my digital space. I focus on the intersection of design and technology, exploring new ways to visualize ideas and capture moments through a digital lens.</p>
        </section>

        <!-- Links/Social -->
        <footer class="links">
            <a href="#">LinkedIn</a>
            <a href="#">Portfolio</a>
            <a href="#">Contact</a>
        </footer>
    </main>

</body>
</html>
